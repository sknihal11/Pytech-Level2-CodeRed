<!DOCTYPE html>
<html>
<head>
    <title>Smart Library Management</title>
    <link rel="stylesheet" href="library.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">Smart Library System</h2>

    <div class="card p-3 mb-4">
        <div class="row">
            <div class="col">
                <input type="text" id="title" class="form-control" placeholder="Book Title">
            </div>
            <div class="col">
                <input type="text" id="author" class="form-control" placeholder="Author">
            </div>
            <div class="col">
                <input type="number" id="copies" class="form-control" placeholder="Copies">
            </div>
            <div class="col">
                <button onclick="addBook()" class="btn btn-primary w-100">Save</button>
            </div>
        </div>
    </div>

    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Available</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="bookTable"></tbody>
    </table>
</div>

<script src="library.js"></script>
</body>
</html>
