<!DOCTYPE html>
<html>
<head>
    <title>Smart Student Management</title>
    <link rel="stylesheet" href="student.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">Smart Student Record System</h2>

    <div class="card p-3 mb-4">
        <div class="row">
            <div class="col">
                <input type="text" id="name" class="form-control" placeholder="Student Name">
            </div>
            <div class="col">
                <input type="number" id="gpa" class="form-control" placeholder="GPA (0-10)">
            </div>
            <div class="col">
                <input type="number" id="attendance" class="form-control" placeholder="Attendance %">
            </div>
            <div class="col">
                <button onclick="addStudent()" class="btn btn-primary w-100">
                    Save
                </button>
            </div>
        </div>
    </div>

    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>GPA</th>
                <th>Attendance</th>
                <th>Risk</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<script src="student.js"></script>
</body>
</html>
